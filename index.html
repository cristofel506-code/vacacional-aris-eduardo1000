<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vacacional Aris Eduardo | Reserva VIP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        <header class="main-header">
            <div class="header-overlay"></div>
            <div class="header-content">
                <div class="badge">PROPIEDAD VERIFICADA</div>
                <h1>Vacacional Aris Eduardo</h1>
                <p>📍 La Romana, Rep. Dominicana</p>
            </div>
        </header>

        <main class="content-body">
            <div class="booking-card">
                <div class="card-header">
                    <h3>Reserva tu estancia</h3>
                    <p>Calcula tu presupuesto al instante</p>
                </div>

                <div class="form-section">
                    <label class="label-pro">1. ¿Cuándo vienes?</label>
                    <div class="input-pro">
                        <span class="icon">📅</span>
                        <input type="text" id="fecha" placeholder="Entrada → Salida" readonly>
                    </div>
                </div>

                <div class="form-section">
                    <label class="label-pro">2. Habitaciones (Máximos permitidos)</label>
                    <div class="room-grid">
                        <div class="room-box">
                            <div class="room-img" style="background-image: url('img/hero1.jpg')"></div>
                            <div class="room-info">
                                <h4>Sencilla</h4>
                                <p class="price">RD$ 1,500</p>
                                <input type="number" id="s" min="0" max="4" value="0">
                            </div>
                        </div>
                        <div class="room-box">
                            <div class="room-img" style="background-image: url('img/hero12.jpg')"></div>
                            <div class="room-info">
                                <h4>Con Aire</h4>
                                <p class="price">RD$ 2,500</p>
                                <input type="number" id="a" min="0" max="3" value="0">
                            </div>
                        </div>
                        <div class="room-box">
                            <div class="room-img" style="background-image: url('img/hero2.jpg')"></div>
                            <div class="room-info">
                                <h4>Doble</h4>
                                <p class="price">RD$ 3,000</p>
                                <input type="number" id="d" min="0" max="3" value="0">
                            </div>
                        </div>
                        <div class="room-box">
                            <div class="room-img" style="background-image: url('img/hero3.jpg')"></div>
                            <div class="room-info">
                                <h4>Triple</h4>
                                <p class="price">RD$ 4,000</p>
                                <input type="number" id="t" min="0" max="2" value="0">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <label class="label-pro">3. Huéspedes</label>
                    <div class="input-pro">
                        <span class="icon">👥</span>
                        <input type="number" id="personas" min="1" placeholder="Ej: 4 personas">
                    </div>
                </div>

                <button id="calcularBtn" class="btn-main">Calcular Presupuesto</button>

                <div id="resultado" class="ticket hidden">
                    <div class="ticket-header">RESUMEN DE COTIZACIÓN</div>
                    <div id="resumenContent"></div>
                    <button id="btnConfirmar" class="btn-confirmar">CONFIRMAR POR WHATSAPP</button>
                </div>
            </div>
        </main>
    </div>

    <div class="floats">
        <a href="https://wa.me/18092823624" class="float-wa" id="waDirecto">
            <div class="waves"></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        </a>
        <div id="adminBtn" class="float-admin">⚙️</div>
    </div>

    <div id="adminPanel" class="modal hidden">
        <div class="modal-content">
            <span id="closeAdmin" class="close">&times;</span>
            <h3>Panel Admin</h3>
            <div id="adminLoginArea">
                <input type="password" id="adminCode" placeholder="Código">
                <button id="loginAdmin" class="btn-main">Entrar</button>
            </div>
            <div id="adminContent" class="hidden">
                <input type="text" id="pickerBloqueo" placeholder="Bloquear fecha">
                <button id="btnBloquear" class="btn-main" style="background:#e11d48; margin-top:10px">Bloquear</button>
                <div id="reservasLista" style="margin-top:20px"></div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
