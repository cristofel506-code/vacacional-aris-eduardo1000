<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vacacional Aris Eduardo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <header class="main-header">
            <div class="header-overlay"></div>
            <div class="header-content">
                <div class="badge">PROPIEDAD VERIFICADA</div>
                <h1>Vacacional Aris Eduardo</h1>
                <p>📍 Villa Altagracia, KM 40 (barrio chino)</p>
            </div>
        </header>

        <main class="content-body">
            <div class="booking-card">
                <div class="promo-bar">✨ Reserva con el <b>50%</b></div>

                <div class="form-section">
                    <label class="label-pro">1. Selecciona tus fechas</label>
                    <div class="input-pro" id="calendar-trigger">
                        <span class="icon">📅</span>
                        <input type="text" id="fecha" placeholder="Toca para elegir fechas" readonly inputmode="none">
                    </div>
                </div>

                <div class="form-section">
                    <label class="label-pro">2. Habitaciones</label>
                    <div class="room-list">
                        <div class="room-item">
                            <div class="room-img" style="background-image: url('img/hero1.jpg')"></div>
                            <div class="room-info">
                                <h4>Sencilla (Abanico)</h4>
                                <p class="price">RD$ 1,500</p>
                            </div>
                            <input type="number" id="s" class="qty-input" value="0" min="0">
                        </div>
                        <div class="room-item">
                            <div class="room-img" style="background-image: url('img/hero12.jpg')"></div>
                            <div class="room-info">
                                <h4>Sencilla (Aire)</h4>
                                <p class="price">RD$ 2,000</p>
                            </div>
                            <input type="number" id="a" class="qty-input" value="0" min="0">
                        </div>
                        <div class="room-item">
                            <div class="room-img" style="background-image: url('img/hero2.jpg')"></div>
                            <div class="room-info">
                                <h4>Doble</h4>
                                <p class="price">RD$ 2,500</p>
                            </div>
                            <input type="number" id="d" class="qty-input" value="0" min="0">
                        </div>
                        <div class="room-item">
                            <div class="room-img" style="background-image: url('img/hero3.jpg')"></div>
                            <div class="room-info">
                                <h4>Triple</h4>
                                <p class="price">RD$ 2,800</p>
                            </div>
                            <input type="number" id="t" class="qty-input" value="0" min="0">
                        </div>
                    </div>
                </div>

                <button id="calcularBtn" class="btn-main">GENERAR PRESUPUESTO</button>

                <div id="resultado" class="ticket hidden">
                    <div id="resumenContent"></div>
                    <button id="btnConfirmar" class="btn-confirmar">CONFIRMAR POR WHATSAPP</button>
                </div>
            </div>
        </main>

        <div id="adminPanel" class="admin-panel hidden">
            <div class="admin-header">
                <h3>Gestión de Reservas</h3>
                <button onclick="toggleAdmin()" class="btn-close">Cerrar</button>
            </div>
            <div id="adminList" class="admin-list"></div>
        </div>
    </div>

    <div class="floats">
        <div class="float-admin" onclick="toggleAdmin()">⚙️</div>
        <a href="https://wa.me/18092823624" class="float-wa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
